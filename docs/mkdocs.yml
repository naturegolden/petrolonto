site_name: PetrolOnto - 石油本体知识平台
site_url: https://naturegolden.github.io/petrolonto/
repo_url: https://github.com/naturegolden/petrolonto
repo_name: naturegolden/petrolonto
edit_uri: edit/main/docs/docs/
extra_css:
  - css/style.css

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - md_in_html
  - toc:
      permalink: "#"

theme:
  custom_dir: overrides
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  name: material
  palette:
    - media: (prefers-color-scheme)
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - accent: purple
      media: "(prefers-color-scheme: light)"
      primary: white
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - accent: purple
      media: "(prefers-color-scheme: dark)"
      primary: black
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 跟随系统设置
  language: zh

plugins:
  - search:
      lang:
        - zh
        - en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          docstring_style: google
          options:
            show_source: false
            heading_level: 2
            separate_signature: true

nav:
  - 首页:
      - index.md
      - quickstart.md
      - 🧠 大脑:
          - brain/index.md
          - brain/brain.md
          - brain/chat.md
      - 🗄️ 存储:
          - storage/index.md
          - storage/base.md
          - storage/local_storage.md
      - 🔍 解析器:
          - parsers/index.md
          - parsers/megaparse.md
          - parsers/simple.md
      - 📊 向量存储:
          - vectorstores/index.md
          - vectorstores/faiss.md
          - vectorstores/pgvector.md
      - 🔄 工作流:
          - workflows/index.md
          - 示例:
              - workflows/examples/basic_ingestion.md
              - workflows/examples/basic_rag.md
              - workflows/examples/rag_with_web_search.md
      - ⚙️ 配置:
          - config/index.md
          - config/config.md
          - config/base_config.md
      - 💡 示例:
          - examples/index.md
          - examples/custom_storage.md
          - examples/chatbot.md
          - examples/chatbot_voice.md
          - examples/chatbot_voice_flask.md
  - 企业版: https://docs.quivr.app/
