name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main, zh-CN-localization]
    paths:
      - "docs/**"
      - "core/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    branches: [main, zh-CN-localization]
    paths:
      - "docs/**"
      - "core/**"
  workflow_dispatch:

# GITHUB_TOKEN permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rye
        uses: eifinger/setup-rye@v4
        with:
          enable-cache: true
          working-directory: docs

      - name: Sync dependencies
        run: |
          UV_INDEX_STRATEGY=unsafe-first-match rye sync --no-lock

      - name: Build documentation
        run: rye run mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  # Deploy job
  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/zh-CN-localization')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
